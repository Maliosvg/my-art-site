baseURL = 'https://my-art-site-ashen.vercel.app/'
languageCode = 'zh-cn'
title = 'bluesquare'
theme = 'gokarna'

[params]
  # --- 基础描述 ---
  description = "个人博客"
  
  # --- 头像设置 (务必确保文件在 static/images/avatar.jpg) ---
  avatarURL = "images/avatar.jpg"
  avatarSize = "sz-50"
  avatarAltText = "My Avatar"

  # --- 功能开关 ---
  showThemeSwitcher = true         # 开启黑白切换
  showPostsOnHomePage = "recent"   # 主页显示最近文章
  numberPostsOnHomePage = 5        # 显示的数量

  # --- 社交图标 (可选) ---
  [[params.socialIcons]]
    name = "X"
    url = "bluesquare1668"
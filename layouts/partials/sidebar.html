<style>
/* Sidebar CSS Variables */
:root {
    --sidebar-bg-light: rgba(255, 255, 255, 0.98);
    --sidebar-bg-dark: rgba(18, 19, 24, 0.98);
    --sidebar-border-light: rgba(0,0,0,0.08);
    --sidebar-border-dark: rgba(255,255,255,0.08);
    --sidebar-text-light: #333;
    --sidebar-text-dark: #eee;
    --sidebar-text-muted-light: #888;
    --sidebar-text-muted-dark: #999;
    --sidebar-hover-light: rgba(0,0,0,0.04);
    --sidebar-hover-dark: rgba(255,255,255,0.04);
    --sidebar-width-expanded: 280px; 
    --sidebar-width-collapsed: 80px;
    --theme-blue: #4a9eda; /* Fixed blue color for progress and hovers */
}

body.light .app-sidebar {
    background: var(--sidebar-bg-light);
    border-right: 1px solid var(--sidebar-border-light);
    color: var(--text-color);
}
.app-sidebar {
    background: var(--sidebar-bg-dark);
    border-right: 1px solid var(--sidebar-border-dark);
    color: var(--text-color); 
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    /* Smooth width transition for sliding effect */
    transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    z-index: 100;
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    overflow-x: hidden; /* Hide overflow during slide */
}
.app-sidebar.expanded { width: var(--sidebar-width-expanded); }
.app-sidebar.collapsed { width: var(--sidebar-width-collapsed); }

/* Smoothly hide expanded UI elements when collapsed */
.app-sidebar .profile-info,
.app-sidebar .nav-text {
    opacity: 1;
    visibility: visible;
    transition: opacity 0.3s ease, visibility 0.3s ease;
    white-space: nowrap;
}

.app-sidebar.collapsed .profile-info,
.app-sidebar.collapsed .nav-text {
    opacity: 0;
    visibility: hidden;
}

/* Smoothly hide collapsed UI elements when expanded */
.app-sidebar .player-collapsed-ui {
    opacity: 0;
    visibility: hidden;
    position: absolute;
    pointer-events: none;
    transition: opacity 0.3s ease, visibility 0.3s ease;
}

.app-sidebar.collapsed .player-collapsed-ui {
    opacity: 1;
    visibility: visible;
    position: relative;
    pointer-events: auto;
}

.sidebar-profile {
    padding: 40px 0 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 280px; /* Fixed width */
}

.avatar-wrap {
    width: 60px;
    height: 60px;
    margin-bottom: 15px;
    border-radius: 50%;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #e0e0e0;
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
/* Shink avatar in collapsed state */
.app-sidebar.collapsed .avatar-wrap {
    width: 44px; height: 44px; margin-bottom: 0;
}

body.light .avatar-wrap { background: #d0d0d0; }
.avatar-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.profile-name {
    font-size: 16px;
    font-weight: 700;
    margin: 0 0 5px;
    letter-spacing: 0.05em;
    color: var(--text-color);
}
.profile-desc {
    font-size: 11px;
    color: var(--sidebar-text-muted-dark);
    margin: 0;
}
body.light .profile-desc { color: var(--sidebar-text-muted-light); }

/* Navigation */
.sidebar-nav {
    display: flex;
    flex-direction: column;
    width: 280px; /* Fixed width to prevent wrapping */
    padding: 0;
    margin-top: 10px;
}
.nav-item {
    display: flex;
    align-items: center;
    padding: 15px 30px; /* Fixed padding so icon doesn't move */
    color: var(--text-color);
    text-decoration: none;
    border-radius: 0;
    margin-bottom: 5px;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.2s, color 0.2s;
    width: 100%;
    box-sizing: border-box;
}
.nav-item:hover {
    background: var(--sidebar-hover-dark);
    color: var(--theme-blue) !important;
}
body.light .nav-item:hover {
    background: var(--sidebar-hover-light);
    color: var(--theme-blue) !important;
}
.nav-icon {
    width: 20px;
    height: 20px;
    margin-right: 15px;
    flex-shrink: 0;
}

.sidebar-spacer {
    flex-grow: 1;
}

/* Player Widget */
.sidebar-player-widget {
    position: relative;
    width: 280px;
    height: 300px; /* Fixed height to reserve space in flex */
    margin-top: auto;
}

@keyframes fadeInUI {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* Expanded Player */
.player-expanded-ui {
    position: absolute;
    bottom: 10px;
    top: auto;
    left: 10px;
    width: 260px; /* Fixed width */
    background: rgba(255, 255, 255, 0.02);
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    border: 1px solid var(--sidebar-border-dark);
    box-sizing: border-box;
    display: block;
    animation: fadeInUI 0.4s ease;
}
.app-sidebar.collapsed .player-expanded-ui {
    display: none;
}
body.light .player-expanded-ui {
    background: rgba(0,0,0,0.02);
    border: 1px solid var(--sidebar-border-light);
}
.player-main {
    display: flex;
    align-items: center;
    margin-bottom: 15px;
}
.player-cover-container {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    margin-right: 12px;
    position: relative;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}
.player-cover-container.small {
    margin-right: 0;
    margin-bottom: 15px;
}
.spin-cover {
    width: 100%;
    height: 100%;
    object-fit: cover;
    animation: spin 10s linear infinite;
    animation-play-state: paused;
}
.spin-cover.playing {
    animation-play-state: running;
}
@keyframes spin { 100% { transform: rotate(360deg); } }

.player-info {
    flex-grow: 1;
    overflow: hidden;
}
.player-title {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    text-overflow: ellipsis;
    overflow: hidden;
    margin-bottom: 3px;
}
.player-artist {
    font-size: 10px;
    color: var(--sidebar-text-muted-dark);
    white-space: nowrap;
    text-overflow: ellipsis;
    overflow: hidden;
    margin-bottom: 8px;
}
body.light .player-artist { color: var(--sidebar-text-muted-light); }

.player-progress-wrap {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    cursor: pointer;
    overflow: hidden;
}
body.light .player-progress-wrap { background: rgba(0,0,0,0.1); }
.player-progress {
    height: 100%;
    width: 0%;
    background: var(--theme-blue);
    border-radius: 2px;
    transition: width 0.1s linear;
}

.player-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}
.player-btn {
    background: transparent;
    border: none;
    color: var(--text-color);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s;
    padding: 5px;
}
.player-btn:hover {
    color: var(--theme-blue);
}
.player-btn.small-btn svg {
    width: 16px;
    height: 16px;
}
.player-btn.big-btn svg {
    width: 26px;
    height: 26px;
}

/* Lyrics Box */
.player-lyrics {
    height: 70px;
    overflow: hidden;
    position: relative;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 30%, black 70%, transparent 100%);
    mask-image: linear-gradient(to bottom, transparent 0%, black 30%, black 70%, transparent 100%);
    scrollbar-width: none;
}
.player-lyrics::-webkit-scrollbar { display: none; }
.lyrics-list {
    list-style: none;
    padding: 0;
    margin: 0;
    text-align: center;
    padding-bottom: 30px; /* buffer space at bottom */
    padding-top: 25px; /* buffer space at top */
}
.lyric-line {
    font-size: 11px;
    color: var(--sidebar-text-muted-dark);
    min-height: 20px;
    line-height: 20px;
    transition: color 0.3s, font-size 0.3s, font-weight 0.3s;
    white-space: normal;
    word-break: break-word;
    margin-bottom: 8px;
}
body.light .lyric-line { color: var(--sidebar-text-muted-light); }
.lyric-line.active {
    color: var(--theme-blue);
    font-size: 13px;
    font-weight: bold;
}
.lyric-line { cursor: pointer; }
.lyric-line:hover { color: var(--theme-blue); }

/* Playlist Box */
.player-playlist {
    height: 70px;
    overflow-y: auto;
    overflow-x: hidden;
}
.player-playlist::-webkit-scrollbar { width: 4px; }
.player-playlist::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.5); border-radius: 2px; }
.playlist-list {
    list-style: none;
    padding: 0;
    margin: 0;
}
.playlist-item {
    font-size: 11px;
    color: var(--sidebar-text-muted-dark);
    padding: 5px 0;
    cursor: pointer;
    transition: color 0.2s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
body.light .playlist-item { color: var(--sidebar-text-muted-light); }
.playlist-item:hover { color: var(--theme-blue); }
.playlist-item.active {
    color: var(--theme-blue);
    font-weight: bold;
}


/* Collapsed Player */
.player-collapsed-ui {
    position: absolute;
    bottom: 10px;
    top: auto;
    left: 10px;
    width: 60px; /* Fixed width */
    background: rgba(255, 255, 255, 0.02);
    border-radius: 40px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    border: 1px solid var(--sidebar-border-dark);
    box-sizing: border-box;
    display: none;
}
.app-sidebar.collapsed .player-collapsed-ui {
    display: flex;
    animation: fadeInUI 0.4s ease;
}
body.light .player-collapsed-ui { 
    background: rgba(0,0,0,0.02); 
    border: 1px solid var(--sidebar-border-light);
}
.player-progress-small-wrap {
    width: 40px;
    height: 3px;
    background: rgba(255,255,255,0.1);
    margin-bottom: 12px;
    border-radius: 2px;
    overflow: hidden;
    cursor: pointer;
}
body.light .player-progress-small-wrap { background: rgba(0,0,0,0.1); }
.player-progress-small {
    width: 0%;
    height: 100%;
    background: var(--theme-blue);
    transition: width 0.1s linear;
}
.player-play-btn-small {
    width: 24px;
    height: 24px;
    background: transparent;
    border: none;
    color: inherit;
    cursor: pointer;
    transition: color 0.2s;
}
.player-play-btn-small:hover { color: var(--theme-blue); }

/* Toggle Btn */
.sidebar-toggle-btn {
    background: transparent;
    border: none;
    color: var(--sidebar-text-muted-dark);
    width: 100%;
    padding: 15px 0;
    cursor: pointer;
    display: flex;
    justify-content: center;
    border-top: 1px solid var(--sidebar-border-dark);
    transition: color 0.2s;
}
body.light .sidebar-toggle-btn { 
    border-top: 1px solid var(--sidebar-border-light); 
    color: var(--sidebar-text-muted-light);
}
.sidebar-toggle-btn:hover {
    color: var(--theme-blue);
}
.sidebar-toggle-btn svg {
    width: 20px;
    height: 20px;
}
/* When pinned, make the pin icon active color */
.app-sidebar.pinned .sidebar-toggle-btn .icon-pin {
    color: var(--theme-blue);
    fill: rgba(74, 158, 218, 0.4);
}

/* Mobile Sidebar Overlay */
.sidebar-mobile-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 90;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
}
.sidebar-mobile-overlay.active {
    opacity: 1;
    visibility: visible;
}

/* Hamburger Button */
.mobile-hamburger-btn {
    display: none;
    position: fixed;
    bottom: 20px;
    left: 20px;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--sidebar-bg-dark);
    color: var(--theme-blue);
    border: 1px solid var(--sidebar-border-dark);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    z-index: 95;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, background 0.2s;
}
body.light .mobile-hamburger-btn {
    background: var(--sidebar-bg-light);
    border: 1px solid var(--sidebar-border-light);
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
.mobile-hamburger-btn:active { transform: scale(0.9); }
.mobile-hamburger-btn svg { width: 24px; height: 24px; }

@media (max-width: 820px) {
    /* Hide the normal toggle button on mobile */
    .sidebar-toggle-btn { display: none !important; }
    
    /* Show Hamburger */
    .mobile-hamburger-btn { display: flex; }

    /* Override Sidebar styles for mobile */
    .app-sidebar {
        transform: translateX(-100%);
        width: 280px !important; /* Force expand width on mobile so player is usable */
        box-shadow: 10px 0 30px rgba(0,0,0,0.5);
    }
    
    /* When active */
    .app-sidebar.mobile-open {
        transform: translateX(0);
    }
    
    /* Force profile and text to be visible on mobile since it's 280px wide */
    .app-sidebar .profile-info,
    .app-sidebar .nav-text {
        opacity: 1 !important;
        visibility: visible !important;
        pointer-events: auto !important;
    }
    
    .app-sidebar .avatar-wrap {
        width: 60px !important; 
        height: 60px !important; 
        margin-bottom: 15px !important;
    }
    
    /* Force big player to show, hide small player */
    .app-sidebar .player-expanded-ui {
        display: block !important;
        opacity: 1 !important;
        animation: none !important;
        bottom: 10px !important; /* move down since toggle btn is hidden */
    }
    .app-sidebar .player-collapsed-ui {
        display: none !important;
    }
}
</style>

{{ define "main" }}
<div class="main">
    <h1>{{ .Title }}</h1>
    <div class="content">
        {{ .Content }}
    </div>
    <div class="posts">
        {{ range .Site.RegularPages }}
            <article>
                <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
                <time>{{ .Date.Format "2006-01-02" }}</time>
            </article>
        {{ end }}
    </div>
</div>
{{ end }}

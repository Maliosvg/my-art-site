<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <title>{{ .Site.Title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 1. 强行找回背景和网格 */
        body {
            background-color: #1a1a1a !important; /* 深灰色背景 */
            background-image: radial-gradient(#333 1px, transparent 1px) !important;
            background-size: 20px 20px !important;
            color: #e0e0e0 !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 50px;
        }

        /* 2. 修复头像样式 */
        .avatar img { 
            width: 150px; 
            height: 150px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid #333;
            background-color: #222; /* 图片加载前的底色 */
        }

        .home-about { text-align: center; margin-bottom: 50px; }
        h1 { font-weight: 300; letter-spacing: 0.2em; margin-top: 20px; text-transform: uppercase; }
        h2 { font-weight: 200; opacity: 0.6; font-size: 1em; }

        /* 3. 作品列表 */
        .home-posts { width: 90%; max-width: 600px; }
        .post-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .post-item a { color: #3498db; text-decoration: none; }
        .post-item time { color: #555; font-family: monospace; }
    </style>
</head>
<body>

<section class="home-about">
    <div class="avatar">
        {{/* 这里的路径一定要带上 / */}}
        <img src="/images/avatar.jpg" alt="avatar" onerror="this.src='https://ui-avatars.com/api/?name=B&background=3498db&color=fff';">
    </div>
    <h1>{{ .Site.Title }}</h1>
    <h2>{{ .Site.Params.description }}</h2>
</section>

<div class="home-posts">
    <h2 style="font-weight: 300; font-size: 1.2em; border-bottom: 1px solid #333; padding-bottom: 10px;">最近作品</h2>
    {{ range (where .Site.RegularPages "Section" "posts") }}
    <div class="post-item">
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <time>{{ .Date.Format "2006-01-02" }}</time>
    </div>
    {{ end }}
</div>

</body>
</html>

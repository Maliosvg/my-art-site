<style>
    /* 强制全局深色网格背景 */
    [data-theme="dark"], body.dark {
        background-color: #1a1a1a !important;
        background-image: radial-gradient(#333 1px, transparent 1px) !important;
        background-size: 20px 20px !important;
        color: #e0e0e0 !important;
    }

    /* 标题艺术感：更细、间距更大 */
    .home-about h1, .home-posts h2 {
        font-weight: 300 !important;
        letter-spacing: 0.15em !important;
        text-transform: uppercase;
    }

    /* 作品列表的呼吸感 */
    .post-item {
        border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
        padding: 20px 0 !important;
    }
</style>
{{ define "main" }}
<section class="home-about">
    <div class="avatar">
<div class="avatar">
    {{ if .Site.Params.avatarURL }}
    <img class="{{ .Site.Params.avatarSize | default "sz-150" }}" 
         src="{{ .Site.Params.avatarURL | relURL }}" 
         alt="avatar" 
         style="max-width: 150px; border-radius: 50%;"> 
    {{ end }}
</div>
</div>

    <h1>{{ .Site.Title }}</h1>
    {{ if .Site.Params.description }}
        <h2>{{ .Site.Params.description }}</h2>
    {{ end }}
</section>

<div class="flex-break"></div>

<div class="home-posts list-posts">
    <h2>最近作品</h2>
    {{ range .Site.RegularPages }}
        <div class="post-item" style="margin-bottom: 20px;">
            <time>{{ .Date.Format "2006-01-02" }}</time>
            {{/* 加上 relURL 确保路径从根目录出发 */}}
            <a href="{{ .RelPermalink }}"><h3>{{ .Title }}</h3></a>
        </div>
    {{ end }}
</div>
</div>
</div>
{{ end }}

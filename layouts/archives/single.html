{{ define "main" }}
<div class="container" style="padding-bottom: 150px; position: relative; z-index: 10;">
    <div class="post-header-section">
        <h1 style="text-align: center; margin-top: 40px; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase;">全部作品 (Archives)</h1>
        <div class="title-accent" style="width: 36px; height: 1.5px; background: linear-gradient(90deg, rgba(50,140,220,0.7), rgba(50,140,220,0.05)); margin: 14px auto 40px;"></div>
    </div>
    <div class="post-content">
        <div class="home-posts" style="width: 100%; max-width: 600px; margin: 0 auto;">
            {{ range ((where .Site.RegularPages "Section" "posts").GroupByDate "2006年01月") }}
            <h2 class="section-title" style="margin-top: 50px;">{{ .Key }}</h2>
            {{ range .Pages }}
            <div class="post-item">
                <a href="{{ .RelPermalink }}">{{ .Title }}</a>
                <div class="dashed-line"></div>
                <time>{{ .Date.Format "01-02" }}</time>
            </div>
            {{ end }}
            {{ end }}
        </div>
    </div>
</div>
{{ end }}
